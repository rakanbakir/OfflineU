<!DOCTYPE html>
<html lang="en">
<head>
    <title>OfflineU - Select Course</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Design Tokens ─────────────────────────────────────────── */
        :root {
            --color-bg:        #0f1117;
            --color-surface:   #1a1d27;
            --color-elevated:  #22262f;
            --color-border:    rgba(255,255,255,.06);
            --color-text:      #e4e6ed;
            --color-text-2nd:  #8b8fa3;
            --color-text-muted:#5b5f6b;
            --color-accent:    #3b82f6;
            --color-accent-hv: #2563eb;
            --color-success:   #22c55e;
            --color-success-bg:rgba(34,197,94,.12);

            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --font-size-xs: .75rem;
            --font-size-sm: .85rem;
            --font-size-md: .95rem;
            --font-size-lg: 1.15rem;
            --font-size-xl: 1.5rem;

            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;

            --radius-sm: 6px;
            --radius-md: 10px;

            --shadow-sm: 0 1px 3px rgba(0,0,0,.3);

            --transition-fast:  150ms ease;
            --transition-base:  250ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: var(--space-8);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: var(--color-accent);
            font-size: var(--font-size-xl);
            margin-bottom: var(--space-6);
            font-weight: 600;
            letter-spacing: -.02em;
        }

        h3 {
            color: var(--color-text-2nd);
            font-size: var(--font-size-md);
            font-weight: 500;
            margin-bottom: var(--space-3);
        }

        .browser-header {
            background: var(--color-surface);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-3);
            border: 1px solid var(--color-border);
            font-size: var(--font-size-sm);
            color: var(--color-text-2nd);
        }

        .directory {
            background: var(--color-surface);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-1);
            cursor: pointer;
            transition: background var(--transition-fast), border-left-color var(--transition-fast), transform var(--transition-fast);
            border-left: 3px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--font-size-sm);
        }

        .directory:hover {
            background: var(--color-elevated);
            border-left-color: var(--color-accent);
            transform: translateX(2px);
        }

        .course-candidate {
            background: var(--color-success-bg);
            border-left-color: var(--color-success);
        }

        .course-candidate:hover {
            background: rgba(34,197,94,.18);
        }

        .directory-name {
            flex: 1;
            color: var(--color-text);
            font-weight: 500;
        }

        .directory-meta {
            color: var(--color-text-muted);
            font-size: var(--font-size-xs);
        }

        .loading-state {
            text-align: center;
            padding: var(--space-8);
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OfflineU - Course Selection</h1>
        <div id="browser"></div>
        <script>
            function escapeHtml(str) {
                return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }

            function loadDirectories(path = '') {
                fetch(`/browse?path=${encodeURIComponent(path)}`)
                    .then(r => r.json())
                    .then(data => {
                        const browser = document.getElementById('browser');
                        browser.innerHTML = `
                            ${data.current_path ? `<div class="browser-header">📂 ${escapeHtml(data.current_path)}</div>` : ''}
                            ${data.parent_path ? `<div class="directory" onclick="loadDirectories('${escapeHtml(data.parent_path)}')">
                                <span>📁</span>
                                <span class="directory-name">.. (Parent)</span>
                            </div>` : ''}
                            ${data.directories.map(dir => `
                                <div class="directory ${dir.is_course_candidate ? 'course-candidate' : ''}" 
                                     onclick="${dir.is_course_candidate ? `loadCourse('${escapeHtml(dir.path)}')` : `loadDirectories('${escapeHtml(dir.path)}')`}">
                                    <span>${dir.is_course_candidate ? '📚' : '📁'}</span>
                                    <span class="directory-name">${escapeHtml(dir.name)}</span>
                                    ${dir.media_files > 0 ? `<span class="directory-meta">${dir.media_files} media files</span>` : ''}
                                </div>
                            `).join('') || '<div class="loading-state">No directories found</div>'}
                        `;
                    });
            }

            function loadCourse(path) {
                fetch('/load_course', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({course_path: path})
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('Error: ' + data.error);
                    }
                });
            }

            loadDirectories();
        </script>
    </div>
</body>
</html>
